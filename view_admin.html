<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - <?= appName ?></title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-slate-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><?= appName ?></h1>
            <div class="space-x-4">
                <span class="text-sm text-slate-300">Admin: <?= adminName ?></span>
                <a href="<?= base_url ?>?page=cetak" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm transition">🖨️ Cetak ID Card</a>
                <a href="<?= base_url ?>" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm transition">Keluar (Home)</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-600 h-fit">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Input Nilai Siswa</h2>
            <form id="formNilai" onsubmit="submitGrade(event)">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Siswa</label>
                    <select id="kd_siswa" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Loading data siswa...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kategori Nilai</label>
                    <select id="kategori_nilai" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Loading kategori...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Judul Materi / Modul</label>
                    <input type="text" id="judul_materi" required placeholder="Contoh: Pembuatan Maskot AI" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nilai (0-100)</label>
                    <input type="number" id="nilai" min="0" max="100" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Keterangan Tambahan</label>
                    <input type="text" id="keterangan" placeholder="Opsional" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                    Simpan Nilai
                </button>
            </form>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-md border-t-4 border-emerald-500 h-fit">
            <h2 class="text-lg font-bold text-gray-800 mb-4">10 Kehadiran Lab Terakhir</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-100 uppercase tracking-wider border-b-2">
                        <tr>
                            <th class="px-4 py-3 font-medium text-gray-600">Waktu Scan</th>
                            <th class="px-4 py-3 font-medium text-gray-600">Nama Siswa</th>
                            <th class="px-4 py-3 font-medium text-gray-600">Status Kehadiran</th>
                        </tr>
                    </thead>
                    <tbody id="tableKehadiran" class="divide-y divide-gray-200">
                        <tr><td colspan="3" class="px-4 py-4 text-center text-gray-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 text-right">
                <button onclick="loadDashboardData()" class="text-sm text-blue-600 hover:underline">Segarkan Data Data ↻</button>
            </div>
        </div>
    </div>

    <script>
        // Memuat data awal saat halaman dibuka
        document.addEventListener('DOMContentLoaded', function() {
          // Kita beri sedikit jeda agar halaman ter-render sempurna terlebih dahulu
            setTimeout(loadDashboardData, 100); 
        });

        function loadDashboardData() {
            google.script.run
                .withSuccessHandler(function(response) {
                    // 1. Render Dropdown Siswa
                    const selectSiswa = document.getElementById('kd_siswa');
                    selectSiswa.innerHTML = '<option value="">-- Pilih Siswa --</option>';
                    response.students.forEach(s => {
                        selectSiswa.innerHTML += `<option value="${s.kd_siswa}">${s.nama} (${s.kelas} ${s.jurusan})</option>`;
                    });

                    // 2. Render Dropdown Kategori
                    const selectKategori = document.getElementById('kategori_nilai');
                    selectKategori.innerHTML = '<option value="">-- Pilih Kategori --</option>';
                    response.kategori_nilai.forEach(k => {
                        selectKategori.innerHTML += `<option value="${k}">${k}</option>`;
                    });

                    // 3. Render Tabel Kehadiran
                    const tableBody = document.getElementById('tableKehadiran');
                    tableBody.innerHTML = '';
                    if(response.attendances.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="3" class="px-4 py-4 text-center text-gray-500">Belum ada data kehadiran hari ini.</td></tr>';
                    } else {
                        response.attendances.forEach(a => {
                            let badgeClass = a.jenis === 'Kelas' ? 'bg-blue-100 text-blue-800' : 'bg-emerald-100 text-emerald-800';
                            tableBody.innerHTML += `
                                <tr class="hover:bg-gray-50">
                                    <td class="px-4 py-3 text-gray-600">${a.waktu}</td>
                                    <td class="px-4 py-3 font-medium text-gray-800">${a.nama}</td>
                                    <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-semibold ${badgeClass}">${a.jenis}</span></td>
                                </tr>
                            `;
                        });
                    }
                })
                .apiGetDashboardData();
        }

        // Fungsi Simpan Nilai
        function submitGrade(event) {
            event.preventDefault(); // Mencegah reload halaman
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = 'Menyimpan...';
            btnSubmit.disabled = true;

            const payload = {
                kd_siswa: document.getElementById('kd_siswa').value,
                kategori_nilai: document.getElementById('kategori_nilai').value,
                judul_materi: document.getElementById('judul_materi').value,
                nilai: document.getElementById('nilai').value,
                keterangan: document.getElementById('keterangan').value
            };

            google.script.run
                .withSuccessHandler(function(response) {
                    if(response.status === 'success') {
                        Swal.fire({ icon: 'success', title: 'Berhasil', text: response.message });
                        document.getElementById('formNilai').reset(); // Kosongkan form
                    } else {
                        Swal.fire({ icon: 'error', title: 'Gagal', text: response.message });
                    }
                    btnSubmit.innerHTML = 'Simpan Nilai';
                    btnSubmit.disabled = false;
                })
                .apiSaveGrade(payload);
        }
    </script>
</body>
</html>
