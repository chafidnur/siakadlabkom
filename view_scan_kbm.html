<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner KBM - <?= appName ?></title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 text-center">
        <div class="mb-6">
            <span class="inline-block py-1 px-3 rounded-full bg-blue-100 text-blue-800 text-sm font-semibold mb-2">MODE KBM (KELAS)</span>
            <h1 class="text-2xl font-bold text-gray-800">Scan QR Code Kehadiran</h1>
            <p class="text-sm text-gray-500 mt-1">Arahkan QR Code NIS ke kamera</p>
        </div>

        <div id="reader" class="w-full overflow-hidden rounded-lg border-2 border-dashed border-gray-300 mb-6"></div>

        <a href="<?= base_url ?>" class="inline-flex items-center justify-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-6 rounded-lg transition duration-200">
            Kembali ke Beranda
        </a>
    </div>

    <script>
        // Fungsi untuk membunyikan suara "Beep"
        function playBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = 800; // Frekuensi suara beep
            oscillator.connect(gainNode);
            gainNode.connect(context.destination);
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 0.1);
            oscillator.stop(context.currentTime + 0.1);
        }
        
        // Konfigurasi Scanner yang Diperbarui
        let isScanning = true;
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: {width: 250, height: 250},
                // Fitur Cerdas: Mengingat kamera (misal webcam eksternal) yang dipilih sebelumnya
                rememberLastUsedCamera: true, 
                // Prioritaskan kamera belakang/kamera utama (jika ada)
                videoConstraints: {
                    facingMode: "environment"
                }
            }, 
            /* verbose= */ false
        );

        function onScanSuccess(decodedText, decodedResult) {
            // Cegah scan berulang jika sedang memproses
            if (!isScanning) return;
            isScanning = false;
            
            playBeep(); // Bunyikan suara
            
            // Tampilkan loading SweetAlert
            Swal.fire({
                title: 'Memproses...',
                text: `Mencatat NIS: ${decodedText}`,
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // Kirim data ke Backend Google Apps Script (Controller)
            // Parameter 2 adalah 'Kelas' sesuai mode ini
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.status === 'success') {
                        Swal.fire({
                            icon: 'success',
                            title: 'Berhasil!',
                            html: `<b>${response.data.nama_lengkap}</b><br>${response.data.kelas} - ${response.data.jurusan}<br><span class="text-sm text-gray-500">Hadir di Kelas</span>`,
                            timer: 3000,
                            timerProgressBar: true,
                            showConfirmButton: false
                        }).then(() => {
                            isScanning = true; // Buka kunci scan
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Gagal',
                            text: response.message,
                            confirmButtonColor: '#3085d6'
                        }).then(() => {
                            isScanning = true;
                        });
                    }
                })
                .apiProcessScan(decodedText, 'Kelas');
        }

        function onScanFailure(error) {
            // Abaikan error saat tidak ada QR yang terdeteksi
        }

        // Jalankan Scanner
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
