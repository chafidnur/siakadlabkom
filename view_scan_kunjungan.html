<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner KBM - <?= appName ?></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 text-center">
        <div class="mb-6">
            <span class="inline-block py-1 px-3 rounded-full bg-emerald-100 text-emerald-800 text-sm font-semibold mb-2">MODE KUNJUNGAN LAB</span>
            <h1 class="text-2xl font-bold text-gray-800">Scan QR Code Kehadiran</h1>
            <p class="text-sm text-gray-500 mt-1">Gunakan tombol di bawah untuk menyalakan kamera</p>
        </div>

        <div class="mb-4 space-y-3 bg-gray-50 p-4 rounded-xl border border-gray-200">
            <div id="cameraSelectContainer" class="hidden text-left">
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Pilih Sumber Kamera:</label>
                <select id="cameraSelect" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500"></select>
            </div>
            
            <div class="flex gap-2">
                <button id="btnStart" onclick="startCamera()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-sm flex items-center justify-center">
                    📷 Aktifkan Kamera
                </button>
                <button id="btnStop" onclick="stopCamera()" disabled class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-sm flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                    🛑 Matikan Kamera
                </button>
            </div>
        </div>

        <div class="relative w-full overflow-hidden rounded-lg border-2 border-dashed border-gray-300 bg-black min-h-[250px] flex items-center justify-center mb-6">
            <div id="reader" class="w-full"></div>
            <div id="placeholderText" class="absolute text-gray-400 text-sm">Kamera belum aktif</div>
        </div>

        <a href="<?= base_url ?>" class="inline-flex items-center justify-center bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-6 rounded-lg transition duration-200">
            Kembali ke Beranda
        </a>
    </div>

    <script>
        let html5QrCode;
        let isScanning = false;
        const cameraSelect = document.getElementById('cameraSelect');
        const cameraSelectContainer = document.getElementById('cameraSelectContainer');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const placeholderText = document.getElementById('placeholderText');

        // Fungsi Audio Beep
        function playBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = 800;
            oscillator.connect(gainNode);
            gainNode.connect(context.destination);
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 0.1);
            oscillator.stop(context.currentTime + 0.1);
        }

        // Meminta izin kamera dan mendeteksi daftar perangkat saat halaman siap
        document.addEventListener('DOMContentLoaded', function() {
            html5QrCode = new Html5Qrcode("reader");
            
            // Deteksi daftar kamera secara diam-diam
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    cameraSelectContainer.classList.remove('hidden');
                    cameraSelect.innerHTML = '';
                    
                    devices.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        // Jika ada webcam eksternal, biasanya teksnya mengandung merk/nama alat tersebut
                        option.text = device.label || `Kamera ${index + 1}`;
                        cameraSelect.appendChild(option);
                    });
                }
            }).catch(err => {
                console.error("Gagal mendeteksi kamera: ", err);
            });
        });

        function startCamera() {
            if(isScanning) return;
            
            const selectedCameraId = cameraSelect.value;
            if(!selectedCameraId) {
                Swal.fire('Error', 'Perangkat kamera tidak terdeteksi.', 'error');
                return;
            }

            placeholderText.classList.add('hidden');
            btnStart.disabled = true;
            btnStop.disabled = false;

            html5QrCode.start(
                selectedCameraId, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText, decodedResult) => {
                    // Pengecekan jika berhasil scan
                    processScannedData(decodedText);
                },
                (errorMessage) => {
                    // Abaikan error real-time jika tidak ada QR di depan kamera
                }
            ).then(() => {
                isScanning = true;
            }).catch(err => {
                placeholderText.classList.remove('hidden');
                btnStart.disabled = false;
                btnStop.disabled = true;
                Swal.fire('Gagal Membuka Kamera', err.message, 'error');
            });
        }

        function stopCamera() {
            if(!isScanning) return;
            
            html5QrCode.stop().then(() => {
                isScanning = false;
                btnStart.disabled = false;
                btnStop.disabled = true;
                placeholderText.classList.remove('hidden');
            }).catch(err => {
                console.error("Gagal menghentikan kamera", err);
            });
        }

        function processScannedData(kd_siswa) {
            // Hentikan sementara pembacaan agar tidak ganda saat memproses data ke server
            stopCamera();
            playBeep();

            Swal.fire({
                title: 'Memproses...',
                text: `Mencatat NIS: ${kd_siswa}`,
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.status === 'success') {
                        Swal.fire({
                            icon: 'success',
                            title: 'Berhasil!',
                            html: `<b>${response.data.nama_lengkap}</b><br>${response.data.kelas} - ${response.data.jurusan}`,
                            timer: 2500,
                            showConfirmButton: false
                        }).then(() => {
                            startCamera(); // Otomatis aktifkan kamera kembali untuk siswa berikutnya
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Gagal',
                            text: response.message
                        }).then(() => {
                            startCamera();
                        });
                    }
                })
                .apiProcessScan(kd_siswa, 'Kunjungan Mandiri');
        }
    </script>
</body>
</html>
