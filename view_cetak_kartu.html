<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak ID Card - <?= appName ?></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pengaturan agar rapi saat diprint ke kertas A4 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            .cetak-area { 
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 20px !important; 
            }
            .kartu-id { break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="no-print max-w-4xl mx-auto mb-8 bg-white p-4 rounded-xl shadow flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-gray-800">Generator ID Card Siswa</h1>
            <p class="text-sm text-gray-500">Gunakan pintasan Ctrl+P untuk mencetak</p>
        </div>
        <div class="space-x-3">
            <a href="<?= base_url ?>?page=admin" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg transition">Kembali</a>
            <button onclick="window.print()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                Cetak Kartu (Print)
            </button>
        </div>
    </div>

    <div id="kartuContainer" class="cetak-area max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="col-span-full text-center py-10 text-gray-500">
            Sedang menghasilkan QR Code untuk seluruh siswa...
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            google.script.run
                .withSuccessHandler(function(students) {
                    const container = document.getElementById('kartuContainer');
                    container.innerHTML = ''; // Hapus teks loading

                    if (students.length === 0) {
                        container.innerHTML = '<p class="col-span-full text-center text-red-500">Belum ada data siswa di database.</p>';
                        return;
                    }

                    // Looping data siswa untuk membuat kartu
                    students.forEach(s => {
                        // Memanggil API QR Code menggunakan NIS (kd_siswa)
                        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${s.kd_siswa}`;
                        
                        const kartuHTML = `
                            <div class="kartu-id bg-white border-2 border-gray-800 rounded-xl overflow-hidden shadow-sm flex flex-row">
                                <div class="p-4 flex-1 flex flex-col justify-between">
                                    <div>
                                        <div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">KARTU AKSES LAB</div>
                                        <h2 class="text-lg font-bold text-gray-800 leading-tight">${s.nama}</h2>
                                        <p class="text-sm text-gray-600 mt-1 font-semibold">${s.kelas} - ${s.jurusan}</p>
                                    </div>
                                    <div class="mt-4">
                                        <span class="inline-block px-2 py-1 bg-gray-200 text-gray-800 text-xs font-bold rounded">NIS: ${s.kd_siswa}</span>
                                    </div>
                                </div>
                                
                                <div class="bg-gray-50 p-4 border-l-2 border-dashed border-gray-300 flex items-center justify-center">
                                    <img src="${qrUrl}" alt="QR Code ${s.kd_siswa}" class="w-24 h-24 object-contain">
                                </div>
                            </div>
                        `;
                        container.innerHTML += kartuHTML;
                    });
                })
                .apiGetAllStudents();
        });
    </script>
</body>
</html>
