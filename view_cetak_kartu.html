<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak ID Card - <?= appName ?></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pengaturan Print ke Kertas A4 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            .cetak-area { 
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 15px !important; 
                justify-items: center;
            }
            .kartu-id { break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="no-print max-w-4xl mx-auto mb-8 bg-white p-4 rounded-xl shadow flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-gray-800">Generator ID Card Siswa</h1>
            <p class="text-sm text-gray-500">Mode Landscape | Sumber Foto: Google Drive</p>
        </div>
        <div class="space-x-3">
            <a href="<?= base_url ?>?page=admin" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white rounded-lg transition">Kembali</a>
            <button onclick="window.print()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition flex items-center">
                🖨️ Cetak Kartu
            </button>
        </div>
    </div>

    <div id="kartuContainer" class="cetak-area max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 justify-items-center">
        <div class="col-span-full text-center py-10 text-gray-500 animate-pulse">
            Menghubungkan ke Google Drive dan menyiapkan foto siswa...
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            google.script.run
                .withSuccessHandler(function(students) {
                    const container = document.getElementById('kartuContainer');
                    container.innerHTML = ''; 

                    if (students.length === 0) {
                        container.innerHTML = '<p class="col-span-full text-center text-red-500">Belum ada data siswa di database.</p>';
                        return;
                    }

                    students.forEach(s => {
                        // QR Code beresolusi tinggi agar tajam saat dicetak
                        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${s.kd_siswa}`;
                        
                        // Desain Kartu Landscape (Ukuran standar ID Card: ~86mm x ~54mm)
                        const kartuHTML = `
                            <div class="kartu-id relative bg-white border-2 border-gray-800 rounded-xl shadow-sm flex flex-row w-[340px] h-[210px] overflow-hidden">
                                
                                <div class="w-3 bg-blue-600 h-full"></div>

                                <div class="w-[90px] h-full flex flex-col justify-center items-center pl-3">
                                    <div class="w-[75px] h-[100px] bg-gray-200 border-2 border-gray-300 rounded overflow-hidden shadow-inner">
                                        <img src="${s.foto}" alt="Foto" class="w-full h-full object-cover">
                                    </div>
                                </div>

                                <div class="flex-1 px-3 py-4 flex flex-col justify-center text-left">
                                    <div class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">KARTU AKSES LAB</div>
                                    
                                    <h2 class="text-[15px] font-bold text-gray-900 leading-tight mb-1" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                        ${s.nama}
                                    </h2>
                                    
                                    <p class="text-[11px] text-gray-700 font-semibold mb-3">
                                        ${s.kelas} - ${s.jurusan}
                                    </p>
                                    
                                    <div>
                                        <span class="inline-block px-3 py-1 bg-gray-800 text-white text-[12px] font-bold rounded tracking-widest shadow-sm">
                                            NIS: ${s.kd_siswa}
                                        </span>
                                    </div>
                                </div>

                                <div class="w-[110px] bg-gray-50 border-l-2 border-dashed border-gray-300 flex flex-col items-center justify-center p-2">
                                    <img src="${qrUrl}" alt="QR" class="w-[90px] h-[90px] object-contain mb-1">
                                    <span class="text-[8px] font-bold text-gray-500 tracking-wider">SCAN HERE</span>
                                </div>
                                
                            </div>
                        `;
                        container.innerHTML += kartuHTML;
                    });
                })
                .apiGetAllStudents();
        });
    </script>
</body>
</html>
