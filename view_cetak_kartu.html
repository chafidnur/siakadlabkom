<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview & Cetak ID Card - <?= appName ?></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pengaturan Print ke Kertas A4 */
        @media print {
            .no-print { display: none !important; }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; /* Memaksa printer mencetak warna background (oranye) */
                print-color-adjust: exact; 
            }
            .cetak-area { 
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 15px !important; 
                justify-items: center;
            }
            .kartu-id { 
                break-inside: avoid; /* Mencegah kartu terpotong di tengah halaman */
                border: 1px solid #e5e7eb !important; 
                box-shadow: none !important; 
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="no-print bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Preview ID Card Siswa</h1>
                <p class="text-sm text-gray-500">Tema: Profesional Oranye | Format: Landscape</p>
            </div>
            <div class="flex space-x-3">
                <a href="<?= base_url ?>?page=admin" target="_top" class="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition duration-200 shadow-sm">
                    Kembali ke Admin
                </a>
                <button onclick="window.print()" id="btnPrint" disabled class="px-5 py-2.5 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg transition duration-200 flex items-center disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                    Cetak Sekarang
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-8">
        <div id="kartuContainer" class="cetak-area grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 justify-items-center">
            
            <div class="col-span-full text-center py-20 text-gray-500 flex flex-col items-center">
                <svg class="animate-spin h-8 w-8 text-orange-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Memuat data dan menarik foto dari Google Drive...
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            google.script.run
                .withSuccessHandler(function(students) {
                    const container = document.getElementById('kartuContainer');
                    const btnPrint = document.getElementById('btnPrint');
                    container.innerHTML = ''; 

                    if (students.length === 0) {
                        container.innerHTML = '<p class="col-span-full text-center text-red-500 font-bold text-lg">Belum ada data siswa di database.</p>';
                        return;
                    }

                    students.forEach(s => {
                        // Memanggil API QR Code, ukuran besar (300x300) dan diubah warnanya menjadi oranye (HEX: ea580c / RGB Tanpa #)
                        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${s.kd_siswa}&color=ea580c`;
                        
                        const kartuHTML = `
                            <div class="kartu-id relative bg-white border border-gray-200 rounded-xl shadow-lg flex flex-col w-[340px] h-[210px] overflow-hidden">
                                
                                <div class="h-10 w-full bg-gradient-to-r from-orange-600 to-orange-400 flex items-center justify-between px-3 text-white">
                                    <div class="font-black text-[12px] tracking-wider uppercase drop-shadow-sm">SMK DUTA KARYA KUDUS</div>
                                    <div class="text-[9px] font-bold bg-white/20 px-2 py-0.5 rounded backdrop-blur-sm tracking-widest">LAB ACCESS</div>
                                </div>

                                <div class="flex-1 flex flex-row w-full">
                                    
                                    <div class="w-[95px] flex justify-center items-center pl-3 py-2">
                                        <div class="w-[75px] h-[100px] bg-gray-100 border-[3px] border-orange-100 rounded-md overflow-hidden shadow-sm">
                                            <img src="${s.foto}" alt="Foto" class="w-full h-full object-cover">
                                        </div>
                                    </div>

                                    <div class="flex-1 px-3 py-3 flex flex-col justify-center">
                                        <h2 class="text-[14px] font-extrabold text-gray-800 leading-tight uppercase mb-1" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                            ${s.nama}
                                        </h2>
                                        
                                        <div class="w-8 h-0.5 bg-orange-500 mb-2"></div>

                                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Konsentrasi Keahlian</p>
                                        <p class="text-[11px] text-orange-700 font-bold mb-2 leading-tight">
                                            ${s.kelas} - ${s.jurusan}
                                        </p>
                                        
                                        <div class="mt-auto">
                                            <span class="inline-block px-2 py-1 bg-gray-800 text-white text-[11px] font-bold rounded shadow-sm tracking-widest">
                                                NIS: ${s.kd_siswa}
                                            </span>
                                        </div>
                                    </div>

                                    <div class="w-[100px] flex flex-col items-center justify-center p-2 bg-orange-50/50 border-l border-orange-100">
                                        <div class="bg-white p-1 rounded shadow-sm border border-gray-200">
                                            <img src="${qrUrl}" alt="QR" class="w-[75px] h-[75px] object-contain">
                                        </div>
                                        <span class="text-[7px] font-bold text-gray-400 tracking-widest mt-1 uppercase">Scan Kehadiran</span>
                                    </div>
                                </div>
                                
                                <div class="h-2 w-full bg-orange-600"></div>
                            </div>
                        `;
                        container.innerHTML += kartuHTML;
                    });
                    
                    // Setelah semua kartu berhasil dirender, aktifkan tombol Cetak
                    btnPrint.disabled = false;
                    btnPrint.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                        </svg>
                        Cetak Sekarang
                    `;
                })
                .apiGetAllStudents();
        });
    </script>
</body>
</html>
